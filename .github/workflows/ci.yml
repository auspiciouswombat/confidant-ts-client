name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Build from committed src/gen/ — skip proto-sync/codegen.
      - name: Build
        run: ./node_modules/.bin/tsc

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # On main: commit updated dist/ if it changed.
      - name: Commit dist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          if git diff --staged --quiet; then
            echo "dist/ is up to date"
          else
            git commit -m "Rebuild dist [ci skip]"
            git push
          fi
